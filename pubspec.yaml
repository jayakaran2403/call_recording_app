name: employee_call_recorder
description: Employee Call Recording & Location Tracking System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local storage
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Permissions
  permission_handler: ^11.3.1

  # File / folder picking
  file_picker: ^8.0.3

  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Networking (for future upload)
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Audio playback (recording history "Play")
  just_audio: ^0.9.38

  # Sharing
  share_plus: ^9.0.0

  # UUID for record ids
  uuid: ^4.4.0

  # Utilities
  intl: ^0.19.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.10

flutter:
  uses-material-design: true
